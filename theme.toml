# 基础配置（固定你的域名）
baseURL = "https://suyoudengtai.com/"
languageCode = "zh-CN"
title = "ICNBUYS - 专业供佛灯 酥油灯 供佛灯座 酥油灯座 供佛灯台 酥油灯台 礼佛文化传播"
enableRobotsTXT = true

# 站点地图配置（自动生成，大模型/搜索引擎必备）
[sitemap]
  changefreq = "daily"
  priority = 0.8
  filename = "sitemap.xml"

# 主题核心参数（大模型+SEO 双优化）
[params]
  # 核心描述：包含关键词，大模型抓取的核心摘要
  description = "ICNBUYS专注佛教礼佛文化传播，分享专业供佛知识、礼佛礼仪，详解如何选择优质酥油灯/供佛灯；如何选择酥油灯座/供佛灯座；如何选择酥油灯台/供佛灯台；官方正品酥油灯座、酥油灯台、供佛灯座、供佛灯台，淘宝热销好评，为您提供安全、如法的供佛用品。"
  author = "速优登泰"
  # 核心关键词，大模型/搜索引擎优先识别
  metaKeywords = "ICNBUYS,供佛灯,酥油灯,供佛灯座,酥油灯座,供佛灯台,酥油灯台,如何选择酥油灯、供佛灯座、酥油灯座、供佛灯台、酥油灯台,礼佛知识,佛教用品,供佛方法"
  
  # 开放图谱标签（微信/微博/AI分享展示，大模型优先识别）
  [params.og]
    image = "/images/logo.jpg"
    type = "website"
    locale = "zh-CN"
    siteName = "ICNBUYS - 专业供佛灯品牌"
  
  # PaperMod 主题优化（公开访问，无权限限制）
  disableThemeToggle = false
  showReadingTime = true
  showToc = true
  hideFooter = false

# 大模型友好：开启所有页面索引，禁止隐藏内容
[outputs]
  home = ["HTML", "RSS", "SITEMAP"]
  page = ["HTML"]
